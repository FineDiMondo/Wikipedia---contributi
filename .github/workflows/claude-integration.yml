name: Claude Integration for Wikipedia Contributions

on:
  push:
      branches: [ main ]
          paths:
                - 'dossier/**'
                      - 'docs/**'
                            - '.github/workflows/claude-integration.yml'
                              pull_request:
                                  branches: [ main ]
                                    workflow_dispatch:

                                    jobs:
                                      validate-and-enhance:
                                          runs-on: ubuntu-latest
                                              permissions:
                                                    contents: read
                                                          pull-requests: write

                                                                  steps:
                                                                      - uses: actions/checkout@v3
                                                                            with:
                                                                                    fetch-depth: 0

                                                                                        - name: Set up Python
                                                                                              uses: actions/setup-python@v4
                                                                                                    with:
                                                                                                            python-version: '3.11'
                                                                                                                    cache: 'pip'
                                                                                                                    
                                                                                                                        - name: Install dependencies
                                                                                                                              run: |
                                                                                                                                      python -m pip install --upgrade pip
                                                                                                                                              pip install -r requirements.txt
                                                                                                                                              
                                                                                                                                                  - name: Validate Wikipedia contributions
                                                                                                                                                        env:
                                                                                                                                                                CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
                                                                                                                                                                      run: |
                                                                                                                                                                              python scripts/validate-with-claude.py
                                                                                                                                                                              
                                                                                                                                                                                  - name: Generate quality report
                                                                                                                                                                                        if: always()
                                                                                                                                                                                              env:
                                                                                                                                                                                                      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                    python scripts/generate-report.py
                                                                                                                                                                                                                            
                                                                                                                                                                                                                                - name: Upload quality report
                                                                                                                                                                                                                                      if: always()
                                                                                                                                                                                                                                            uses: actions/upload-artifact@v3
                                                                                                                                                                                                                                                  with:
                                                                                                                                                                                                                                                          name: claude-quality-report
                                                                                                                                                                                                                                                                  path: reports/
                                                                                                                                                                                                                                                                          retention-days: 30
                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                              - name: Comment on PR with findings
                                                                                                                                                                                                                                                                                    if: github.event_name == 'pull_request'
                                                                                                                                                                                                                                                                                          uses: actions/github-script@v6
                                                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                                                        script: |
                                                                                                                                                                                                                                                                                                                  const fs = require('fs');
                                                                                                                                                                                                                                                                                                                            const reportPath = 'reports/summary.md';
                                                                                                                                                                                                                                                                                                                                      if (fs.existsSync(reportPath)) {
                                                                                                                                                                                                                                                                                                                                                  const report = fs.readFileSync(reportPath, 'utf8');
                                                                                                                                                                                                                                                                                                                                                              github.rest.issues.createComment({
                                                                                                                                                                                                                                                                                                                                                                            issue_number: context.issue.number,
                                                                                                                                                                                                                                                                                                                                                                                          owner: context.repo.owner,
                                                                                                                                                                                                                                                                                                                                                                                                        repo: context.repo.repo,
                                                                                                                                                                                                                                                                                                                                                                                                                      body: report
                                                                                                                                                                                                                                                                                                                                                                                                                                  });
                                                                                                                                                                                                                                                                                                                                                                                                                                            }
